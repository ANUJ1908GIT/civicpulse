kind = "web"
previewPath = "/"
title = "CivicPulse AI"
version = "1.0.0"
id = "artifacts/civicpulse"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 20389

[services.development]
run = "pnpm --filter @workspace/civicpulse run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/civicpulse", "run", "build" ]
publicDir = "artifacts/civicpulse/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "20389"
BASE_PATH = "/"
